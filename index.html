<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>COOLE W WEBSITE</title>
<link rel="icon" type="image/x-icon" href="/web/favicon.ico">

<style>
    body {
        margin: 0;
        background: #0a0a0a;
        color: #00ffcc;
        font-family: monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .container {
        text-align: center;
    }

    .loader {
        width: 90px;
        height: 90px;
        border: 5px solid #222;
        border-top: 5px solid #00ffcc;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 25px auto;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .text {
        font-size: 18px;
        opacity: 0.8;
    }

    video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
        background: black;
    }

    .hint {
        margin-top: 15px;
        font-size: 13px;
        opacity: 0.4;
    }
</style>
</head>

<body>

<div class="container" id="loaderScreen">
    <h1>Daten initialisieren</h1>
    <div class="loader"></div>
    <div class="text" id="status">Verbinde mit Server...</div>
    <div class="hint">(falls es hängt, klicken)</div>
</div>

<video id="video" src="video.mp4"></video>

<script>
    const video = document.getElementById("video");

    const texts = [
        "Verbinde mit Server...",
        "Authentifiziere...",
        "Lade Daten...",
        "Analysiere Paketströme...",
        "Dekodiere Stream..."
    ];

    let i = 0;
    setInterval(() => {
        document.getElementById("status").innerText = texts[i % texts.length];
        i++;
    }, 1500);

    document.body.addEventListener("click", () => {
        document.getElementById("loaderScreen").style.display = "none";

        video.style.display = "block";
        video.muted = false;
        video.currentTime = 0;
        video.play();
    }, { once: true });
</script>

</body>
</html>
